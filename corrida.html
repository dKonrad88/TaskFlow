<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0f14">
<title>Klain Run — Painel de Evolução</title>
<style>
  :root{
    --bg:#0b0f14; --bg2:#0f141b; --card:#151c26; --card2:#1b2430;
    --line:#222d3a; --txt:#e8eef6; --mut:#8a98ab; --mut2:#5d6b7d;
    --acc:#ff5a1f;            /* laranja energia */
    --acc2:#2ad4c4;           /* ciano aeróbico */
    --good:#3ddc84; --warn:#ffc24b; --bad:#ff5d6c; --info:#5aa9ff;
    --grad: linear-gradient(135deg,#ff5a1f,#ff8a3d);
    --r:16px; --sb: env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  body{max-width:520px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
  a{color:inherit}

  /* ====== Top bar ====== */
  header{position:sticky;top:0;z-index:40;background:rgba(11,15,20,.82);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);padding:14px 16px 12px;padding-top:calc(14px + env(safe-area-inset-top,0px))}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;
    font-weight:800;font-size:16px;color:#fff;box-shadow:0 4px 14px rgba(255,90,31,.35)}
  .brand h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px}
  .brand small{display:block;color:var(--mut);font-size:11px;font-weight:500;margin-top:1px}
  .sync{display:flex;align-items:center;gap:8px}
  .syncTime{font-size:10px;color:var(--mut);text-align:right;line-height:1.25;max-width:96px}
  .rbtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--card);
    color:var(--txt);display:grid;place-items:center;cursor:pointer;flex:0 0 auto}
  .rbtn:active{transform:scale(.94)}
  .rbtn svg{width:19px;height:19px}
  .spin{animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ====== Layout ====== */
  main{padding:16px 14px 96px}
  .tab{display:none;animation:fade .35s ease}
  .tab.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  section{margin-bottom:18px}
  .sechead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 10px}
  .sechead h2{font-size:13px;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);margin:0;font-weight:700}
  .sechead .tag{font-size:10px;color:var(--mut2)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px}
  .card + .card{margin-top:12px}
  .soft{color:var(--mut)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:var(--card2)}
  .pill.g{color:var(--good);border-color:rgba(61,220,132,.3);background:rgba(61,220,132,.08)}
  .pill.w{color:var(--warn);border-color:rgba(255,194,75,.3);background:rgba(255,194,75,.08)}
  .pill.b{color:var(--bad);border-color:rgba(255,93,108,.3);background:rgba(255,93,108,.08)}
  .pill.i{color:var(--info);border-color:rgba(90,169,255,.3);background:rgba(90,169,255,.08)}
  .pill.a{color:var(--acc2);border-color:rgba(42,212,196,.3);background:rgba(42,212,196,.08)}

  /* hero */
  .hero{background:radial-gradient(120% 140% at 0% 0%,#1a2433,#10161e);border:1px solid var(--line);
    border-radius:20px;padding:18px 16px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,90,31,.22),transparent 70%)}
  .hero .hi{font-size:13px;color:var(--mut)}
  .hero .big{font-size:23px;font-weight:800;margin:3px 0 2px;letter-spacing:.2px}
  .hero .sub{font-size:12.5px;color:var(--mut);position:relative;z-index:2}

  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px}
  .kpi .v{font-size:20px;font-weight:800;letter-spacing:.3px}
  .kpi .l{font-size:11px;color:var(--mut);margin-top:2px}
  .kpi .d{font-size:10.5px;margin-top:5px;font-weight:600}
  .up{color:var(--good)} .dn{color:var(--bad)} .fl{color:var(--mut)}

  /* coach */
  .coach{border:1px solid rgba(42,212,196,.25);background:linear-gradient(135deg,rgba(42,212,196,.10),rgba(42,212,196,.02))}
  .coach .h{display:flex;align-items:center;gap:9px;font-weight:700;font-size:14px;margin-bottom:8px}
  .coach .dot{width:9px;height:9px;border-radius:50%;background:var(--acc2);box-shadow:0 0 0 4px rgba(42,212,196,.16)}
  .coach p{margin:6px 0;font-size:13px;line-height:1.5;color:#cdd8e6}
  .coach .rec{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

  /* gauge */
  .gauge{display:flex;align-items:center;gap:16px}
  .gwrap{flex:0 0 auto}
  .gtxt{font-size:13px;line-height:1.5;color:#cdd8e6}
  .gtxt b{color:var(--txt)}

  /* progress */
  .prog{height:10px;border-radius:999px;background:var(--card2);overflow:hidden;margin-top:8px}
  .prog > i{display:block;height:100%;border-radius:999px;background:var(--grad)}
  .prog.a > i{background:linear-gradient(90deg,#2ad4c4,#5aa9ff)}
  .prog.g > i{background:linear-gradient(90deg,#3ddc84,#2ad4c4)}

  /* list rows */
  .seg{display:flex;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;margin-bottom:12px}
  .seg button{flex:1;border:0;background:transparent;color:var(--mut);font-size:12.5px;font-weight:600;
    padding:8px 6px;border-radius:9px;cursor:pointer}
  .seg button.on{background:var(--acc);color:#fff;box-shadow:0 3px 10px rgba(255,90,31,.3)}

  .act{display:flex;align-items:center;gap:12px;padding:12px 13px;background:var(--card);border:1px solid var(--line);
    border-radius:13px;cursor:pointer}
  .act + .act{margin-top:9px}
  .act:active{background:var(--card2)}
  .icn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;font-size:17px}
  .icn.run{background:rgba(255,90,31,.13);color:var(--acc)}
  .icn.gym{background:rgba(90,169,255,.13);color:var(--info)}
  .icn.ride{background:rgba(61,220,132,.13);color:var(--good)}
  .act .mid{flex:1;min-width:0}
  .act .t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .act .s{font-size:11.5px;color:var(--mut);margin-top:2px}
  .act .rt{text-align:right;flex:0 0 auto}
  .act .rt .p{font-size:14px;font-weight:800}
  .act .rt .p2{font-size:10.5px;color:var(--mut);margin-top:2px}
  .act .chev{color:var(--mut2)}

  .detail{margin-top:9px;padding:13px;background:var(--card2);border:1px dashed var(--line);border-radius:13px;display:none}
  .detail.on{display:block}
  .grid4{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .mini{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px}
  .mini .mv{font-size:15px;font-weight:800}
  .mini .ml{font-size:10px;color:var(--mut);margin-top:2px}
  .note{font-size:12px;color:#bcc8d8;line-height:1.5;margin-top:10px;padding:9px 11px;background:rgba(42,212,196,.06);
    border-left:3px solid var(--acc2);border-radius:7px}

  /* chart */
  .chart{width:100%;display:block}
  .chlbl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--mut2);margin-top:4px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--mut);margin-top:8px}
  .legend i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}

  table.t{width:100%;border-collapse:collapse;font-size:12.5px}
  table.t th{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut2);text-align:right;padding:7px 6px;font-weight:700}
  table.t th:first-child,table.t td:first-child{text-align:left}
  table.t td{padding:9px 6px;border-top:1px solid var(--line);text-align:right}
  table.t tr td:first-child{font-weight:600}

  .barbox{display:flex;align-items:center;gap:10px;margin:9px 0}
  .barbox .bl{width:74px;font-size:12px;color:var(--mut);flex:0 0 auto}
  .barbox .bt{flex:1;height:22px;border-radius:7px;background:var(--card2);overflow:hidden;position:relative}
  .barbox .bt > i{display:block;height:100%;border-radius:7px}
  .barbox .bv{width:54px;text-align:right;font-size:12px;font-weight:700;flex:0 0 auto}

  .pr{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
  .pr:first-child{border-top:0}
  .pr .pe{font-size:20px;width:30px;text-align:center}
  .pr .pm{flex:1}
  .pr .pm .pt{font-size:13px;font-weight:600}
  .pr .pm .pd{font-size:11px;color:var(--mut)}
  .pr .pv{font-size:17px;font-weight:800;color:var(--acc)}

  .ins{font-size:13px;line-height:1.55;color:#cdd8e6}
  .ins b{color:var(--txt)}
  .big-num{font-size:30px;font-weight:800;letter-spacing:.5px}

  /* bottom nav */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;z-index:50;
    background:rgba(13,18,25,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);
    display:flex;padding:7px 6px calc(7px + var(--sb))}
  nav button{flex:1;border:0;background:transparent;color:var(--mut2);display:flex;flex-direction:column;
    align-items:center;gap:4px;padding:6px 2px;cursor:pointer;font-size:10px;font-weight:600;border-radius:12px}
  nav button svg{width:22px;height:22px}
  nav button.on{color:var(--acc)}
  nav button.on svg{filter:drop-shadow(0 2px 6px rgba(255,90,31,.5))}

  .toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
    background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:11px 16px;border-radius:12px;
    font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.3s;z-index:60;box-shadow:0 8px 28px rgba(0,0,0,.5);
    display:flex;align-items:center;gap:9px;max-width:88%}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .ok{color:var(--good)}

  .ghost{width:100%;border:1px dashed var(--line);background:transparent;color:var(--mut);
    padding:11px;border-radius:12px;font-size:12.5px;font-weight:600;cursor:pointer;margin-top:4px}
  .ghost:active{background:var(--card)}
  .foot{text-align:center;color:var(--mut2);font-size:10.5px;margin-top:18px;line-height:1.6}
</style>
</head>

<header>
  <div class="hrow">
    <div class="brand">
      <div class="logo">K</div>
      <div>
        <h1>Klain Run</h1>
        <small>Painel de evolução · Diego</small>
      </div>
    </div>
    <div class="sync">
      <div class="syncTime" id="syncTime">sincronizado<br>agora há pouco</div>
      <button class="rbtn" id="refreshBtn" title="Atualizar do Strava">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div class="tab on" id="t-hoje"></div>
  <div class="tab" id="t-evol"></div>
  <div class="tab" id="t-trein"></div>
  <div class="tab" id="t-metas"></div>
  <div class="tab" id="t-ins"></div>
</main>

<nav id="nav">

    Hoje</button>
  <button data-t="evol">

    Evolução</button>
  <button data-t="trein">

    Treinos</button>
  <button data-t="metas">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>
    Metas</button>
  <button data-t="ins">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>
    Insights</button>
</nav>

/* Zonas reais (Strava) */
const HRZ = [119,148,163,178];            // limites Z1..Z4 (Z5 acima)

/* ---------- parse ---------- */
function parse(){
  return RAW.split('\n').map(l=>{
    const p=l.split('|');
    const o={ d:p[0], type:p[1], km:+p[2], s:+p[3], el:+p[4]||0, re:+p[5]||0,
      cal:+p[6]||0, cad:p[7]?+p[7]:null, hr:p[8]?+p[8]:null, indoor:p[9]==='1', name:p[10]||'' };
    o.date=new Date(o.d+'T08:00:00');
    o.pace = (o.type!=='gym' && o.km>0)? o.s/o.km : null;       // seg/km
    o.ef = (o.hr && o.km>0)? (o.km*1000/(o.s/60))/o.hr : null;  // efic. aeróbica
    return o;
  });
}
let ACT = parse();

/* ---------- helpers ---------- */
const pad=n=>String(n).padStart(2,'0');
function pace(sk){ if(sk==null) return '—'; const m=Math.floor(sk/60),s=Math.round(sk%60); return m+':'+pad(s); }
function clock(sec){ sec=Math.round(sec); const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s=sec%60;
  return h?`${h}:${pad(m)}:${pad(s)}`:`${m}:${pad(s)}`; }
function dur(sec){ const m=Math.round(sec/60); if(m<60) return m+' min'; return Math.floor(m/60)+'h'+pad(m%60); }
function dmy(d){ return pad(d.getDate())+'/'+pad(d.getMonth()+1); }
const MES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function daysAgo(d){ return Math.floor((NOW-d)/86400000); }
function within(d,days){ const diff=(NOW-d)/86400000; return diff>=0 && diff<days; }
function mondayOf(d){ const x=new Date(d); const w=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-w); return x; }
function riegel(t1,d1,d2){ return t1*Math.pow(d2/d1,1.06); }
function hrZone(hr){ if(hr<=HRZ[0])return 1; if(hr<=HRZ[1])return 2; if(hr<=HRZ[2])return 3; if(hr<=HRZ[3])return 4; return 5; }

/* ---------- charts (SVG) ---------- */
function lineChart(vals, opt={}){
  const W=320,H=140,pl=6,pr=6,pt=14,pb=20;
  const real=vals.filter(v=>v!=null);
  if(!real.length) return '';
  let mn=Math.min(...real), mx=Math.max(...real);
  if(mn===mx){mn-=1;mx+=1;}
  const pad=(mx-mn)*.12; mn-=pad; mx+=pad;
  const n=vals.length;
  const X=i=> pl+(W-pl-pr)*(n<=1?.5:i/(n-1));
  const Y=v=>{ let t=(v-mn)/(mx-mn); if(opt.invert)t=1-t; return pt+(H-pt-pb)*(1-t); };
  const col=opt.color||'var(--acc)';
  let pts=[], dots='', area='';
  vals.forEach((v,i)=>{ if(v==null)return; const x=X(i).toFixed(1),y=Y(v).toFixed(1);
    pts.push(x+','+y); dots+=`<circle cx="${x}" cy="${y}" r="2.6" fill="${col}"/>`; });
  const poly=`<polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
  if(pts.length){ const f=pts[0].split(',')[0], l=pts[pts.length-1].split(',')[0];
    area=`<polygon points="${f},${H-pb} ${pts.join(' ')} ${l},${H-pb}" fill="${col}" opacity="0.07"/>`; }
  const hi=opt.invert?mn+pad:mx-pad, lo=opt.invert?mx-pad:mn+pad;
  const fmt=opt.fmt||(x=>Math.round(x));
  let xl='';
  if(opt.xlabels){ const step=Math.max(1,Math.ceil(n/4));
    for(let i=0;i<n;i+=step){ if(vals[i]==null)continue; xl+=`<text x="${X(i)}" y="${H-6}" fill="var(--mut2)" font-size="9" text-anchor="middle">${opt.xlabels[i]}</text>`; } }
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <text x="${pl}" y="11" fill="var(--mut2)" font-size="9">${fmt(opt.invert?mn+pad:mx-pad)}${opt.unit||''}</text>
    <text x="${pl}" y="${H-pb+9}" fill="var(--mut2)" font-size="9">${fmt(opt.invert?mx-pad:mn+pad)}${opt.unit||''}</text>
    ${area}${poly}${dots}${xl}</svg>`;
}
function barChart(vals, labels, opt={}){
  const W=320,H=140,pl=6,pr=6,pt=14,pb=20;
  const mx=Math.max(...vals,1);
  const n=vals.length, gap=4, bw=(W-pl-pr)/n - gap;
  let bars='';
  vals.forEach((v,i)=>{ const h=(H-pt-pb)*(v/mx); const x=pl+i*((W-pl-pr)/n)+gap/2; const y=H-pb-h;
    const col=opt.colorFn?opt.colorFn(i,v):'var(--acc)';
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" rx="3" fill="${col}"/>`;
    if(opt.labels){ const step=Math.max(1,Math.ceil(n/6));
      if(i%step===0) bars+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-6}" fill="var(--mut2)" font-size="8.5" text-anchor="middle">${labels[i]}</text>`; }
  });
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <text x="${pl}" y="11" fill="var(--mut2)" font-size="9">${Math.round(mx)}${opt.unit||''}</text>${bars}</svg>`;
}
function gaugeSVG(ratio){
  // ACWR 0..2 mapped on semicircle
  const v=Math.max(0,Math.min(2,ratio)); const ang=Math.PI*(1-v/2);
  const cx=70,cy=70,r=56;
  const seg=(a0,a1,col)=>{ const x0=cx+r*Math.cos(a0),y0=cy-r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy-r*Math.sin(a1);
    return `<path d="M ${x0.toFixed(1)} ${y0.toFixed(1)} A ${r} ${r} 0 0 1 ${x1.toFixed(1)} ${y1.toFixed(1)}" fill="none" stroke="${col}" stroke-width="11" stroke-linecap="round"/>`; };
  const A=x=>Math.PI*(1-x/2);
  const needX=cx+(r-4)*Math.cos(ang), needY=cy-(r-4)*Math.sin(ang);
  return `<svg width="140" height="84" viewBox="0 0 140 84">
    ${seg(A(0),A(0.8),'var(--info)')}
    ${seg(A(0.8),A(1.3),'var(--good)')}
    ${seg(A(1.3),A(1.5),'var(--warn)')}
    ${seg(A(1.5),A(2),'var(--bad)')}
    <line x1="${cx}" y1="${cy}" x2="${needX.toFixed(1)}" y2="${needY.toFixed(1)}" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#fff"/>
    <text x="${cx}" y="80" fill="var(--txt)" font-size="15" font-weight="800" text-anchor="middle">${ratio.toFixed(2)}</text></svg>`;
}

/* ============================================================
   MÉTRICAS DERIVADAS
   ============================================================ */
function compute(){
  const runs=ACT.filter(a=>a.type==='run').sort((a,b)=>a.date-b.date);
  const all=ACT.slice().sort((a,b)=>a.date-b.date);
  const M={runs,all};

  // janelas
  const sum=(arr,f)=>arr.reduce((s,a)=>s+f(a),0);
  M.last7 = all.filter(a=>within(a.date,7));
  M.prev7 = all.filter(a=>{const dd=(NOW-a.date)/86400000;return dd>=7&&dd<14;});
  M.last7km = sum(M.last7.filter(a=>a.type==='run'),a=>a.km);
  M.prev7km = sum(M.prev7.filter(a=>a.type==='run'),a=>a.km);
  M.last7load = sum(M.last7,a=>a.re);
  M.last7sess = M.last7.length;

  // ano
  M.ytdRuns=runs.length;
  M.ytdKm=sum(runs,a=>a.km);
  M.ytdElev=sum(runs,a=>a.el);
  M.ytdCal=sum(all,a=>a.cal);
  M.ytdHours=sum(all,a=>a.s)/3600;
  M.gymCount=all.filter(a=>a.type==='gym').length;

  // ACWR (carga aguda/crônica) usando RE
  const acute=sum(all.filter(a=>within(a.date,7)),a=>a.re);
  const chronic=sum(all.filter(a=>within(a.date,28)),a=>a.re)/4;
  M.acwr = chronic>0? acute/chronic : 0;
  M.acute=acute; M.chronic=chronic;

  // última corrida
  M.lastRun = runs[runs.length-1];
  M.daysSinceRun = daysAgo(M.lastRun.date);

  // streak (dias consecutivos com atividade, terminando na última atividade)
  const daysSet=new Set(all.map(a=>a.d));
  let streak=0; let cur=new Date(all[all.length-1].date); cur.setHours(0,0,0,0);
  while(daysSet.has(cur.getFullYear()+'-'+pad(cur.getMonth()+1)+'-'+pad(cur.getDate()))){ streak++; cur.setDate(cur.getDate()-1); }
  M.streak=streak;

  // volume semanal (últimas 14 semanas)
  const wk={};
  runs.forEach(r=>{ const k=mondayOf(r.date).toISOString().slice(0,10); wk[k]=(wk[k]||0)+r.km; });
  const wkeys=Object.keys(wk).sort();
  M.weeks = wkeys.slice(-14).map(k=>({k,km:wk[k],lab:dmy(new Date(k+'T08:00:00'))}));
  M.bestWeek=Math.max(...Object.values(wk));

  // pace trend (corridas outdoor >=5km)
  M.paceRuns = runs.filter(r=>r.km>=5 && !r.indoor);

  // EF trend
  M.efRuns = runs.filter(r=>r.ef!=null);
  M.efPeak = Math.max(...M.efRuns.map(r=>r.ef));
  // baseline fácil pré-pausa & reanchor
  const easyPre = M.efRuns.filter(r=>r.hr<=150 && r.date < new Date('2026-06-15'));
  M.efBaseline = easyPre.reduce((s,r)=>s+r.ef,0)/easyPre.length;
  M.efReturn = ACT.find(a=>a.d==='2026-06-23').ef;
  M.reanchor = M.efReturn/M.efBaseline;

  // polarização (corridas com FC)
  const buckets={easy:0,mod:0,hard:0,ekm:0,mkm:0,hkm:0};
  M.efRuns.forEach(r=>{ const z=hrZone(r.hr);
    if(z<=2){buckets.easy++;buckets.ekm+=r.km;} else if(z===3){buckets.mod++;buckets.mkm+=r.km;} else {buckets.hard++;buckets.hkm+=r.km;} });
  M.pol=buckets;
  const tk=buckets.ekm+buckets.mkm+buckets.hkm;
  M.polPct={easy:buckets.ekm/tk*100,mod:buckets.mkm/tk*100,hard:buckets.hkm/tk*100};

  // mensal
  const mo={};
  runs.forEach(r=>{ const k=r.date.getFullYear()+'-'+pad(r.date.getMonth()+1);
    (mo[k]=mo[k]||{km:0,n:0,s:0,long:0}); mo[k].km+=r.km; mo[k].n++; mo[k].s+=r.s; mo[k].long=Math.max(mo[k].long,r.km); });
  M.months=Object.keys(mo).sort().map(k=>({k,mes:MES[+k.split('-')[1]-1],...mo[k]}));

  return M;
}

  const ar = dp>0?'▲':(dp<0?'▼':'•');
  return `<span class="d ${cls}">${ar} ${Math.abs(dp).toFixed(0)}% vs 7d ant.</span>`;
}

    const icon = a.type==='gym'?'🏋️':(a.type==='ride'?'🚴':'🏃');
    const main = a.type==='gym'? dur(a.s) : a.km.toFixed(2)+' km';
    const right = a.type==='gym'? '<div class="p2">esforço '+a.re+'</div>'
      : `<div class="p">${pace(a.pace)}</div><div class="p2">/km${a.hr?' · '+Math.round(a.hr)+'bpm':''}</div>`;
    // detalhe
    let det='';
    if(a.type==='run'){
      const simil=M.runs.filter(r=>Math.abs(r.km-a.km)<=1.5 && !r.indoor);
      const avgP=simil.reduce((s,r)=>s+r.pace,0)/simil.length;
      const dp=((a.pace-avgP)/avgP*100);
      const cmp = a.indoor?'Treino indoor (esteira) — fora das comparações de pace de rua.'
        : (Math.abs(dp)<1.5?'No mesmo ritmo da sua média para essa distância.'
          : (dp<0?`<b style="color:var(--good)">${Math.abs(dp).toFixed(0)}% mais rápido</b> que sua média p/ distância parecida.`
                 :`${Math.abs(dp).toFixed(0)}% mais lento que sua média (provável dia fácil/forte terreno).`));
      det=`<div class="detail" id="d${id}">
        <div class="grid4">
          <div class="mini"><div class="mv">${clock(a.s)}</div><div class="ml">Tempo</div></div>
          <div class="mini"><div class="mv">${pace(a.pace)}</div><div class="ml">Pace /km</div></div>
          <div class="mini"><div class="mv">${a.km.toFixed(2)}</div><div class="ml">Km</div></div>
          <div class="mini"><div class="mv">${a.hr?Math.round(a.hr):'—'}</div><div class="ml">FC média</div></div>
          <div class="mini"><div class="mv">${a.el} m</div><div class="ml">Elevação</div></div>
          <div class="mini"><div class="mv">${a.re}</div><div class="ml">Esforço rel.</div></div>
          <div class="mini"><div class="mv">${a.cad?a.cad.toFixed(0):'—'}</div><div class="ml">Cadência</div></div>
          <div class="mini"><div class="mv">${a.cal}</div><div class="ml">Kcal</div></div>
          <div class="mini"><div class="mv">${a.ef?a.ef.toFixed(2):'—'}</div><div class="ml">IEA</div></div>
        </div>
        <div class="note">${cmp}</div>
      </div>`;
    } else {
      det=`<div class="detail" id="d${id}">
        <div class="grid4">
          <div class="mini"><div class="mv">${dur(a.s)}</div><div class="ml">Duração</div></div>
          <div class="mini"><div class="mv">${a.re}</div><div class="ml">Esforço</div></div>
          <div class="mini"><div class="mv">${a.cal}</div><div class="ml">Kcal</div></div>
        </div>
        <div class="note">Treino de força entra no seu <b>índice de carga</b> e ajuda a segurar a musculatura — importante pra economia de corrida e prevenção de lesão.</div>
      </div>`;
    }
    return `<div><div class="act" data-d="d${id}">
        <div class="icn ${ic}">${icon}</div>
        <div class="mid"><div class="t">${a.name||(a.type==='gym'?'Musculação':'Corrida')}</div>
          <div class="s">${pad(a.date.getDate())} ${MES[a.date.getMonth()]} · ${main}${a.indoor?' · esteira':''}</div></div>
        <div class="rt">${right}</div>
        <div class="chev">›</div>
      </div>${det}</div>`;
  }).join('');

  document.getElementById('t-trein').innerHTML=`
    <div class="seg">
      <button data-f="all" class="${trFilter==='all'?'on':''}">Tudo (${ACT.length})</button>
      <button data-f="run" class="${trFilter==='run'?'on':''}">Corridas (${M.runs.length})</button>
      <button data-f="gym" class="${trFilter==='gym'?'on':''}">Academia (${M.gymCount})</button>
    </div>
    ${rows}
    <div class="foot">Toque numa atividade para ver os detalhes e a comparação automática.</div>
  `;
  document.querySelectorAll('.seg button').forEach(b=>b.onclick=()=>{trFilter=b.dataset.f;renderTrein();});
  document.querySelectorAll('.act').forEach(el=>el.onclick=()=>{
    const d=document.getElementById(el.dataset.d); document.querySelectorAll('.detail.on').forEach(x=>{if(x!==d)x.classList.remove('on')}); d.classList.toggle('on');
    if(d.classList.contains('on')) d.scrollIntoView({behavior:'smooth',block:'nearest'});
  });
}

/* ============================================================
   RENDER — Metas & Previsões
   ============================================================ */
function renderMetas(){
  const preds=[
    {e:'⚡',d:'5 km',  t:BEST.k5,                       n:'recorde real'},
    {e:'🔥',d:'10 km', t:BEST.k10,                      n:'recorde real'},
    {e:'🎯',d:'15 km', t:riegel(BEST.k10,10,15),        n:'projeção'},
    {e:'🏅',d:'21 km', t:riegel(BEST.k10,10,21.0975),   n:'projeção · meta'},
    {e:'🏔️',d:'42 km', t:riegel(BEST.k10,10,42.195),    n:'projeção otimista'},
  ];
  const longest=Math.max(...M.runs.map(r=>r.km));
  const fastRun=M.runs.filter(r=>r.km>=5).sort((a,b)=>a.pace-b.pace)[0];
  const maxCal=Math.max(...M.runs.map(r=>r.cal));

  document.getElementById('t-metas').innerHTML=`
    <section>
      <div class="sechead"><h2>Previsão de provas</h2><span class="tag">fórmula de Riegel</span></div>
      <div class="card" style="padding:6px 13px">
        ${preds.map(p=>`<div class="pr"><div class="pe">${p.e}</div>
          <div class="pm"><div class="pt">${p.d}</div><div class="pd">${p.n}</div></div>
          <div class="pv">${clock(p.t)}</div></div>`).join('')}
        <div class="note">Estimado a partir do seu <b>10 km recorde (48:55)</b>. Previsões assumem treino específico para a distância — quanto mais longo, mais otimista. Quer baixar o tempo? O segredo está nos km fáceis (veja Insights).</div>
      </div>
    </section>

    <section>
      <div class="sechead"><h2>Meta: Meia Maratona</h2></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div><span class="big-num">${longest.toFixed(1)}</span><span class="soft" style="font-size:14px"> / 21,1 km</span></div>
          <span class="pill a">${(longest/21.0975*100).toFixed(0)}%</span>
        </div>
        <div class="prog a"><i style="width:${longest/21.0975*100}%"></i></div>
        <p class="soft" style="font-size:12.5px;margin:11px 0 0;line-height:1.55">Plano sugerido: 1 longo/semana subindo <b style="color:var(--txt)">+1,5 km a cada 2 semanas</b> (16 → 17,5 → 19 → 21), sempre em ritmo fácil. Tempo-alvo na chegada: <b style="color:var(--acc)">~${clock(riegel(BEST.k10,10,21.0975))}</b>.</p>
      </div>
    </section>

    <section>
      <div class="sechead"><h2>Mural de recordes</h2></div>
      <div class="card" style="padding:6px 13px">
        <div class="pr"><div class="pe">📏</div><div class="pm"><div class="pt">Maior distância</div><div class="pd">16/05 · 16,1 km</div></div><div class="pv">16,1<small style="font-size:12px"> km</small></div></div>
        <div class="pr"><div class="pe">⚡</div><div class="pm"><div class="pt">Melhor 5 km</div><div class="pd">22/03</div></div><div class="pv">${clock(BEST.k5)}</div></div>
        <div class="pr"><div class="pe">🔥</div><div class="pm"><div class="pt">Melhor 10 km</div><div class="pd">22/03</div></div><div class="pv">${clock(BEST.k10)}</div></div>
        <div class="pr"><div class="pe">💨</div><div class="pm"><div class="pt">Km mais rápido</div><div class="pd">melhor parcial</div></div><div class="pv">${clock(BEST.k1)}</div></div>
        <div class="pr"><div class="pe">📅</div><div class="pm"><div class="pt">Maior semana</div><div class="pd">volume</div></div><div class="pv">${M.bestWeek.toFixed(1)}<small style="font-size:12px"> km</small></div></div>
        <div class="pr"><div class="pe">🏃</div><div class="pm"><div class="pt">Pace médio top</div><div class="pd">${dmy(fastRun.date)} · ${fastRun.km.toFixed(1)} km</div></div><div class="pv">${pace(fastRun.pace)}</div></div>
        <div class="pr"><div class="pe">🔋</div><div class="pm"><div class="pt">Mais calorias</div><div class="pd">numa corrida</div></div><div class="pv">${maxCal}</div></div>
      </div>
    </section>
  `;
}

/* ============================================================
   RENDER — Insights (o "algo novo")
   ============================================================ */
function renderIns(){
  const acwr=M.acwr;
  let azone,acls,atxt;
  if(acwr<0.8){azone='Zona segura / destreino';acls='i';atxt='Carga abaixo da sua base — bom pra recuperar, mas correndo pouco a forma cai. Pode subir com tranquilidade.';}
  else if(acwr<=1.3){azone='Faixa ideal 🎯';acls='g';atxt='Você está treinando na dose certa: estímulo suficiente sem pico de risco. Mantenha.';}
  else if(acwr<=1.5){azone='Atenção';acls='w';atxt='A carga subiu rápido. Segure o ritmo de aumento nesta semana.';}
  else {azone='Risco de lesão';acls='b';atxt='Pico de carga muito acima da base — janela clássica de lesão. Reduza.';}

  const p=M.polPct;
  const efNow=M.efRuns[M.efRuns.length-1].ef;
  const reanchorPct=Math.min(100,M.reanchor*100);

  document.getElementById('t-ins').innerHTML=`
    <div class="foot" style="margin:0 0 14px;text-align:left;color:var(--mut)">Indicadores que o Strava e o Garmin <b style="color:var(--txt)">não te mostram assim</b> — feitos pra te fazer evoluir, não só registrar.</div>

    <section>
      <div class="sechead"><h2>① Termômetro de carga</h2><span class="tag">risco de lesão · ACWR</span></div>
      <div class="card">
        <div class="gauge">
          <div class="gwrap">${gaugeSVG(acwr)}</div>
          <div class="gtxt"><span class="pill ${acls}">${azone}</span><p style="margin:9px 0 0">${atxt}</p></div>
        </div>
        <div class="note">Relação entre o que você treinou <b>nos últimos 7 dias</b> (${Math.round(M.acute)}) e sua <b>média de 4 semanas</b> (${Math.round(M.chronic)}). A ciência mostra que pular pra fora de 0,8–1,3 multiplica o risco de lesão. <b>Inclui corrida + academia.</b></div>
      </div>
    </section>

    <section>
      <div class="sechead"><h2>② Religando a base</h2><span class="tag">pós-pausa · exclusivo</span></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div class="ins">Eficiência recuperada após as 2 semanas paradas</div>
          <span class="pill ${reanchorPct>=98?'g':'w'}">${reanchorPct.toFixed(0)}%</span>
        </div>
        <div class="prog ${reanchorPct>=98?'g':''}"><i style="width:${reanchorPct}%"></i></div>
        <div class="note">Sua eficiência fácil voltou a <b>${reanchorPct.toFixed(0)}%</b> do nível pré-pausa (${M.efReturn.toFixed(2)} vs base ${M.efBaseline.toFixed(2)}). Traduzindo: <b>você não perdeu fitness</b> — faltou só reafinar. Mais 1–2 semanas de corridas fáceis e a FC volta a cair pro pace de sempre.</div>
      </div>
    </section>

    <section>
      <div class="sechead"><h2>③ Distribuição de intensidade</h2><span class="tag">regra 80/20</span></div>
      <div class="card">
        <div class="barbox"><div class="bl">Fácil (Z1-2)</div><div class="bt"><i style="width:${p.easy}%;background:var(--good)"></i></div><div class="bv">${p.easy.toFixed(0)}%</div></div>
        <div class="barbox"><div class="bl">Médio (Z3)</div><div class="bt"><i style="width:${p.mod}%;background:var(--warn)"></i></div><div class="bv">${p.mod.toFixed(0)}%</div></div>
        <div class="barbox"><div class="bl">Forte (Z4-5)</div><div class="bt"><i style="width:${p.hard}%;background:var(--bad)"></i></div><div class="bv">${p.hard.toFixed(0)}%</div></div>
        <div class="note">⚠️ <b>Seu maior ponto de evolução.</b> Você passa <b>${(p.mod+p.hard).toFixed(0)}% do tempo em esforço médio-forte</b> — a famosa <b>"zona cinza"</b>. Os melhores correm ~80% bem fácil e ~20% bem forte. Correr <b>mais devagar</b> nos dias fáceis vai, paradoxalmente, te deixar <b>mais rápido</b> nas provas. Meta: levar o verde pra ~80%.</div>
      </div>
    </section>

    <section>
      <div class="sechead"><h2>④ Eficiência aeróbica</h2><span class="tag">IEA</span></div>
      <div class="card">
        <div style="display:flex;align-items:baseline;gap:10px">
          <span class="big-num" style="color:var(--acc2)">${efNow.toFixed(2)}</span>
          <span class="soft">atual · pico ${M.efPeak.toFixed(2)}</span>
        </div>
        <div class="note">Velocidade por batimento. Subiu de <b>${M.efRuns[0].ef.toFixed(2)}</b> (jan) ao pico de <b>${M.efPeak.toFixed(2)}</b>. Como você corre quase tudo em ritmo médio, o IEA fácil ainda tem teto — é o item ③ que vai destravar ele. Acompanhe nos dias fáceis: se subir, seu motor melhorou.</div>
      </div>
    </section>

    <section>
      <div class="sechead"><h2>⑤ Mestre do negative split</h2><span class="tag">seu talento</span></div>
      <div class="card">
        <div class="ins">No seu 16 km você fez a 2ª metade <b style="color:var(--good)">33 s/km mais rápida</b> que a 1ª — pacing de manual. 👏</div>
        <div class="note">Negative split (terminar mais rápido) é raro e poupa lesão/parede. O app vai marcar ✓ toda corrida em que você fechar mais forte do que começou — continue assim nos longos.</div>
      </div>
    </section>

    <div class="foot">IEA, Termômetro de Carga e "Religando a base" são cálculos próprios deste painel.<br>Atualizam sozinhos a cada nova atividade sincronizada.</div>
  `;
}

/* ============================================================
   NAV + REFRESH + SIMULATE
   ============================================================ */
const RENDERERS={hoje:renderHoje,evol:renderEvol,trein:renderTrein,metas:renderMetas,ins:renderIns};
let curTab='hoje';
function renderAll(){ Object.values(RENDERERS).forEach(f=>f()); }
function show(t){
  curTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.getElementById('t-'+(t==='hoje'?'hoje':t==='evol'?'evol':t==='trein'?'trein':t==='metas'?'metas':'ins')).classList.add('on');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>show(b.dataset.t));

function toast(msg,ok){ const t=document.getElementById('toast');
  t.innerHTML=(ok?'<span class="ok">✓</span> ':'')+msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2400); }

const rb=document.getElementById('refreshBtn');
rb.onclick=()=>{
  const ic=rb.querySelector('svg'); ic.classList.add('spin');
  setTimeout(()=>{ ic.classList.remove('spin');
    M=compute(); renderAll();
    document.getElementById('syncTime').innerHTML='sincronizado<br>agora há pouco';
    toast('Tudo em dia — 0 novas atividades',true);
  },850);
};

/* demo do sync automático: injeta uma corrida nova e recalcula tudo */
let simN=0;
function simulate(){
  simN++;
  const km=+(6+Math.random()*6).toFixed(2);
  const paceS=345-Math.random()*25;             // ~5:20–5:45 (tende a melhorar)
  const s=Math.round(km*paceS);
  const hr=+(146+Math.random()*8).toFixed(1);
  const re=Math.round(km*8+Math.random()*15);
  const cal=Math.round(km*72);
  const d=NOW.getFullYear()+'-'+pad(NOW.getMonth()+1)+'-'+pad(NOW.getDate());
  const o={d,type:'run',km,s,el:Math.round(Math.random()*60),re,cal,cad:+(85+Math.random()*3).toFixed(1),
    hr,indoor:false,name:'Corrida sincronizada agora',date:new Date(NOW),pace:s/km,ef:(km*1000/(s/60))/hr};
  ACT.push(o);
  M=compute(); renderAll();
  const rb2=document.getElementById('refreshBtn').querySelector('svg'); rb2.classList.add('spin');
  setTimeout(()=>rb2.classList.remove('spin'),800);
  document.getElementById('syncTime').innerHTML='sincronizado<br>agora há pouco';
  show('hoje');
  toast(`Nova corrida de ${km.toFixed(1)} km incorporada!`,true);
}

renderAll();
</script>
</body>
</html>
